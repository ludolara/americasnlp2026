model_name_or_path: "models/aya-vision-32b"
local_dataset_path: "data/americasnlp2026"
train_split: "train"
eval_split: "validation"
source_column: "es"
target_column: "target"
bidirectional_translation: true

output_dir: "outputs/aya-vision-32b-americas"
max_seq_length: 256
packing: false
language_sampling_alpha: 0.3

per_device_train_batch_size: 32
per_device_eval_batch_size: 32
gradient_accumulation_steps: 1
learning_rate: 2.0e-5
num_train_epochs: 60
warmup_ratio: 0.03
weight_decay: 0.01
lr_scheduler_type: "linear"

logging_steps: 25
save_steps: 50
eval_steps: 50
save_total_limit: 3
save_only_model: true
early_stopping_patience: 3
early_stopping_threshold: 0.0005

bf16: true
fp16: false
gradient_checkpointing: true
deepspeed: "configs/deepspeed_lora_zero3.json"
ddp_find_unused_parameters: false

lora_r: 32
lora_alpha: 64
lora_dropout: 0.1
lora_bias: "none"
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

seed: 42
report_to: "none"
