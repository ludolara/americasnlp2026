model_name_or_path: "outputs/tiny-aya-global-wixarika"
trust_remote_code: false
local_dataset_path: "data/wixarika_spanish_hf"
train_split: "train"
eval_split: "validation"

source_column: "es"
target_column: "wix"
source_name: "Spanish"
target_name: "Wixarika"

output_dir: "outputs/tiny-aya-global-wixarika-grpo"
max_completion_length: 2048
num_generations: 8
temperature: 0.9
top_p: 1.0
top_k: 0
beta: 0.0

per_device_train_batch_size: 32
per_device_eval_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 1.0e-6
num_train_epochs: 30
warmup_ratio: 0.03
weight_decay: 0.0
lr_scheduler_type: "linear"

logging_steps: 25
save_steps: 250
eval_steps: 250
save_total_limit: 3

bf16: true
fp16: false
gradient_checkpointing: true

seed: 42
report_to: "none"
