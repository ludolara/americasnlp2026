model_name_or_path: "outputs/aya-vision-32b-americas"
dataset_path: "data/captioning"
train_split: "validation"
languages:
  - "wixarika"
  - "bribri"
  - "guarani"
  - "nahuatl"
output_dir: "outputs/aya-vision-32b-americas-captioning"
prompt_template: "Escribe un solo pie de foto en {language} para esta imagen. Debe ser una descripcion culturalmente adecuada de la imagen. Responde solo con el pie de foto en {language}, sin explicaciones."
eval_percentage: 0.1

max_seq_length: 4096
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 2.0e-5
num_train_epochs: 10
warmup_ratio: 0.03
weight_decay: 0.01
lr_scheduler_type: "linear"

logging_steps: 5
save_steps: 25
save_total_limit: 3
early_stopping_patience: 2
early_stopping_threshold: 0.001
language_sampling_alpha: 1.0

lora_r: 32
lora_alpha: 64
lora_dropout: 0.1
lora_bias: "none"
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

bf16: true
fp16: false
gradient_checkpointing: true
deepspeed: "configs/deepspeed_lora_zero3.json"
ddp_find_unused_parameters: false

seed: 42
report_to: "none"
dry_run: false
